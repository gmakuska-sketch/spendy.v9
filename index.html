function addEntry(){
  if(!state.selCat||!state.amt||isNaN(pf(state.amt)))return;
  const e={id:Date.now().toString(),date:state.selDate,category:state.selCat,amount:pf(state.amt),note:state.note.trim()||undefined};

function delEntry(id){state.entries=state.entries.filter(e=>e.id!==id);persist();render()}

  state.periods=state.periods.map(p=>!p.end?{...p,end:endDate,spent:computeSpent(curEnts)}:p);

  const today=tk();const curP=cp();

function restoreFromBackup(file){
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      if(data.entries)state.entries=data.entries;
      if(data.categories)state.cats=data.categories;
      if(data.periods)state.periods=data.periods;
      if(data.budgets)state.budgets=data.budgets;
      if(data.payplan)state.payplan=data.payplan;
      const curPer=state.periods.find(p=>!p.end);

      persist();state.showExport=false;state.saved=true;render();

function addPayday(){
  const sal=pf(state.pdSalary)||0,rent=pf(state.pdRent)||0;
  const closed=state.periods.filter(p=>p.end).sort((a,b)=>b.end.localeCompare(a.end));
  let livingAmt=0;let periodLabel=cp().label;
  if(closed.length>0){const lastP=closed[0];const pEnts=state.entries.filter(e=>e.date>=lastP.start&&e.date<=lastP.end);livingAmt=pEnts.reduce((s,e)=>s+e.amount,0);periodLabel=lastP.label;}
  const manualLiving=pf(state.pdLiving);
  if(manualLiving&&!isNaN(manualLiving))livingAmt=Math.abs(manualLiving);
  const extras=(state.pdExtras||[]).filter(x=>x.name.trim()||pf(x.amount));
  const extrasTotal=extras.reduce((s,x)=>s+(pf(x.amount)||0),0);
  const net=sal+rent+extrasTotal-livingAmt;
  const entry={month:state.editPaydayIdx!==null?state.payplan[state.editPaydayIdx].month:periodLabel,date:state.editPaydayIdx!==null?state.payplan[state.editPaydayIdx].date:tk(),salary:sal,rent:rent,extras:extras.map(x=>({name:x.name.trim(),amount:pf(x.amount)||0,note:x.note?.trim()||undefined})),living:Math.round(-livingAmt),net:Math.round(net),notes:state.pdNotes.trim()||undefined};
  if(state.editPaydayIdx!==null){state.payplan=state.payplan.map((p,i)=>i===state.editPaydayIdx?entry:p)}
  else{state.payplan=[...state.payplan,entry]}
  state.showPaydayModal=false;state.editPaydayIdx=null;resetPdState();
  persist();render();
}

      });pad.appendChild(trend);
    }

    pad.appendChild(h('p',{style:{fontSize:'10px',color:'#3E4260',marginTop:'12px',textAlign:'center'}},'Tap any card to edit'));
    app.appendChild(pad);
  }

  // Payday modal
  if(state.showPaydayModal){
    const closed=state.periods.filter(p=>p.end).sort((a,b)=>b.end.localeCompare(a.end));
    let lastLiving=0;let lastLabel='(none)';
    if(closed.length>0){const lastP=closed[0];lastLabel=lastP.label;const pEnts=state.entries.filter(e=>e.date>=lastP.start&&e.date<=lastP.end);lastLiving=pEnts.reduce((s,e)=>s+e.amount,0);}
    const isEdit=state.editPaydayIdx!==null;
    const ov=h('div',{className:'ov',on:{click:e=>{if(e.target===e.currentTarget){state.editPaydayIdx=null;update({showPaydayModal:false})}}}});
    const md=h('div',{className:'md',style:{maxHeight:'85vh',overflowY:'auto'}});
    md.appendChild(h('h3',{style:{margin:'0 0 12px',fontSize:'16px',color:'#E8E9F0'}},isEdit?'Edit Payday':'Log Payday'));

    md.appendChild(h('span',{className:'sl',style:{display:'block',marginBottom:'8px'}},'Fixed'));
    // Salary (always positive)
    md.appendChild(h('label',{style:{fontSize:'11px',color:'#6B7094',display:'block',marginBottom:'3px',marginTop:'8px'}},'Net Salary'));
    md.appendChild(h('input',{type:'text',inputMode:'decimal',className:'mi',placeholder:'Amount that hit your account',value:state.pdSalary,on:{input:e=>{state.pdSalary=e.target.value;updPv()}}}));
    // Rent (with +/- toggle)
    md.appendChild(h('label',{style:{fontSize:'11px',color:'#6B7094',display:'block',marginBottom:'3px',marginTop:'8px'}},'Rent / Mortgage'));
    const rentIsNeg=state.pdRent.startsWith('-');
    md.appendChild(h('div',{style:{display:'flex',gap:'6px',alignItems:'center'}},
      h('input',{type:'text',inputMode:'decimal',className:'mi',style:{flex:1},placeholder:'750',value:state.pdRent.replace(/^-/,''),on:{input:e=>{const v=e.target.value.replace(/^-/,'');state.pdRent=(rentIsNeg?'-':'')+v;updPv()}}}),
      h('button',{style:{background:rentIsNeg?'#3A1A1A':'#1A3A1A',border:'1px solid '+(rentIsNeg?'#5A2A2A':'#2A5A2A'),borderRadius:'9px',color:rentIsNeg?'#E8564A':'#4AE88A',fontSize:'14px',fontWeight:700,width:'38px',height:'38px',cursor:'pointer',fontFamily:'inherit',flexShrink:0},on:{click:()=>{state.pdRent=state.pdRent.startsWith('-')?state.pdRent.slice(1):'-'+state.pdRent;updPv();render()}}},rentIsNeg?'−':'+')
    ));
    md.appendChild(h('label',{style:{fontSize:'11px',color:'#6B7094',display:'block',marginBottom:'3px',marginTop:'8px'}},`Living Expenses${!isEdit?' (from '+lastLabel+')':''}`));
    md.appendChild(h('input',{type:'text',inputMode:'decimal',className:'mi',placeholder:isEdit?'Living amount':`Auto: \u20AC${lastLiving.toFixed(0)}`,value:state.pdLiving,on:{input:e=>{state.pdLiving=e.target.value;updPv()}}}));

    md.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:'16px',marginBottom:'8px'}},
      h('span',{className:'sl'},'Extras'),
      h('button',{className:'ch',style:{fontSize:'11px',padding:'3px 10px'},on:{click:()=>{state.pdExtras=[...(state.pdExtras||[]),{name:'',amount:'',note:''}];render()}}},'+ Add')
    ));

    if(!state.pdExtras||state.pdExtras.length===0){
      md.appendChild(h('p',{style:{fontSize:'12px',color:'#3E4260',margin:'4px 0 8px'}},'No extras. Tap + Add for holidays, credit card, insurance, etc.'));
    } else {
      state.pdExtras.forEach((ex,xi)=>{
        const row=h('div',{style:{background:'#0E0E24',borderRadius:'10px',padding:'10px',marginBottom:'8px'}});
        row.appendChild(h('div',{style:{display:'flex',gap:'6px',marginBottom:'6px'}},
          h('input',{type:'text',className:'mi',style:{flex:1,fontSize:'13px',padding:'7px 10px'},placeholder:'Name (e.g. Holidays)',value:ex.name,on:{input:e=>{state.pdExtras[xi].name=e.target.value}}}),
          h('input',{type:'text',inputMode:'decimal',className:'mi',style:{width:'60px',fontSize:'13px',padding:'7px 10px'},placeholder:'500',value:ex.amount.replace(/^-/,''),on:{input:e=>{const v=e.target.value.replace(/^-/,'');state.pdExtras[xi].amount=(state.pdExtras[xi].amount.startsWith('-')?'-':'')+v;updPv()}}}),
          h('button',{style:{background:ex.amount.startsWith('-')?'#3A1A1A':'#1A3A1A',border:'1px solid '+(ex.amount.startsWith('-')?'#5A2A2A':'#2A5A2A'),borderRadius:'7px',color:ex.amount.startsWith('-')?'#E8564A':'#4AE88A',fontSize:'14px',fontWeight:700,width:'32px',height:'32px',cursor:'pointer',fontFamily:'inherit',flexShrink:0},on:{click:()=>{const cur=state.pdExtras[xi].amount;state.pdExtras[xi].amount=cur.startsWith('-')?cur.slice(1):'-'+cur;updPv();render()}}},ex.amount.startsWith('-')?'−':'+'),
          h('button',{className:'dl',style:{fontSize:'18px',color:'#5C6080'},on:{click:()=>{state.pdExtras=state.pdExtras.filter((_,i)=>i!==xi);render()}}},'\u00D7')
        ));
        row.appendChild(h('input',{type:'text',className:'mi',style:{width:'100%',fontSize:'11px',padding:'6px 10px'},placeholder:'Comment (optional)',value:ex.note||'',on:{input:e=>{state.pdExtras[xi].note=e.target.value}}}));
        md.appendChild(row);
      });
    }

    const quickExtras=['Holidays','Credit Card','Insurance','Medical','Car','Gift'];
    const existingNames=(state.pdExtras||[]).map(x=>x.name.toLowerCase());
    const available=quickExtras.filter(q=>!existingNames.includes(q.toLowerCase()));
    if(available.length>0){
      const qRow=h('div',{style:{display:'flex',flexWrap:'wrap',gap:'4px',marginBottom:'12px'}});
      available.forEach(q=>{qRow.appendChild(h('button',{className:'ch',style:{fontSize:'10px',padding:'3px 8px',color:'#5C6080'},on:{click:()=>{state.pdExtras=[...(state.pdExtras||[]),{name:q,amount:'',note:''}];render()}}},`+ ${q}`))});
      md.appendChild(qRow);
    }

    md.appendChild(h('label',{style:{fontSize:'11px',color:'#6B7094',display:'block',marginBottom:'3px',marginTop:'8px'}},'General Notes (optional)'));
    md.appendChild(h('input',{className:'mi',placeholder:'e.g. bonus month, late payment...',value:state.pdNotes,on:{input:e=>{state.pdNotes=e.target.value}}}));

    const pvDiv=h('div',{id:'pd-preview',style:{background:'#0E0E24',borderRadius:'10px',padding:'10px 12px',marginTop:'14px'}});
    md.appendChild(pvDiv);
    function updPv(){
      const s=pf(state.pdSalary)||0,r=pf(state.pdRent)||0;
      const lv=pf(state.pdLiving)||(isEdit?0:lastLiving);
      const exT=(state.pdExtras||[]).reduce((sum,x)=>sum+(pf(x.amount)||0),0);
      const net=s+r+exT-Math.abs(lv);
      const ln=(l,v,c)=>`<div style="display:flex;justify-content:space-between;padding:2px 0"><span style="font-size:11px;color:#5C6080">${l}</span><span style="font-size:11px;color:${c};font-weight:500">\u20AC${v.toFixed(0)}</span></div>`;
      let html=ln('Salary',s,'#4AE88A')+ln('Rent',r,'#E8564A')+ln('Living',-Math.abs(lv),'#E8564A');
      (state.pdExtras||[]).forEach(x=>{if(pf(x.amount))html+=ln(x.name||'Extra',pf(x.amount),'#8B6DB0')});
      html+=`<div style="display:flex;justify-content:space-between;border-top:1px solid #1A1A30;padding-top:6px;margin-top:4px"><span style="font-size:13px;color:#B0B4CC;font-weight:600">Net Result</span><span style="font-size:16px;font-weight:700;color:${net>=0?'#4AE88A':'#E8564A'}">\u20AC${net.toFixed(0)}</span></div>`;
      pvDiv.innerHTML=html;
    }
    updPv();

    md.appendChild(h('div',{style:{display:'flex',gap:'8px',marginTop:'14px'}},
      h('button',{className:'mc',on:{click:()=>{state.editPaydayIdx=null;update({showPaydayModal:false})}}},'Cancel'),
      h('button',{className:'ms',on:{click:addPayday}},isEdit?'Save Changes':'Save Payday')
    ));
    ov.appendChild(md);app.appendChild(ov);
  }

  // ===== MODALS =====
  if(state.showAddCat){
    const ov=h('div',{className:'ov',on:{click:e=>{if(e.target===e.currentTarget)update({showAddCat:false})}}});
    const md=h('div',{className:'md'});
    md.appendChild(h('h3',{style:{margin:'0 0 12px',fontSize:'16px',color:'#E8E9F0'}},'New Category'));
    md.appendChild(h('input',{className:'mi',placeholder:'Name',value:state.ncLabel,on:{input:e=>{state.ncLabel=e.target.value}}}));
    md.appendChild(h('p',{style:{fontSize:'11px',color:'#5C6080',margin:'10px 0 5px'}},'Icon'));
    const ig=h('div',{style:{display:'flex',flexWrap:'wrap',gap:'5px'}});
    ICONS.forEach(i=>{ig.appendChild(h('button',{className:`icon-pick${state.ncIcon===i?' sel':''}`,on:{click:()=>{state.ncIcon=i;render()}}},i))});md.appendChild(ig);
    md.appendChild(h('p',{style:{fontSize:'11px',color:'#5C6080',margin:'10px 0 5px'}},'Color'));
    const cg=h('div',{style:{display:'flex',flexWrap:'wrap',gap:'5px'}});
    COLORS.forEach(c=>{cg.appendChild(h('button',{className:`color-pick${state.ncColor===c?' sel':''}`,style:{background:c},on:{click:()=>{state.ncColor=c;render()}}}))});md.appendChild(cg);
    md.appendChild(h('div',{style:{display:'flex',gap:'8px',marginTop:'16px'}},
      h('button',{className:'mc',on:{click:()=>update({showAddCat:false})}},'Cancel'),
      h('button',{className:'ms',on:{click:addCat}},'Add')
    ));
    ov.appendChild(md);app.appendChild(ov);
  }

  if(state.showPeriodModal){
    const ov=h('div',{className:'ov',on:{click:e=>{if(e.target===e.currentTarget)update({showPeriodModal:false,periodAction:null})}}});
    const md=h('div',{className:'md'});
    md.appendChild(h('h3',{style:{margin:'0 0 14px',fontSize:'16px',color:'#E8E9F0'}},'Manage Period'));
    md.appendChild(h('div',{className:'period-info'},
      h('p',{style:{margin:0,fontSize:'13px',color:'#B0B4CC'},innerHTML:`<strong>Current:</strong> ${curP.label}`}),
      h('p',{style:{margin:'4px 0 0',fontSize:'12px',color:'#5C6080'}},`Started ${fd(curP.start)} · Day ${daysIn} · €${curTotal.toFixed(0)} spent`)
    ));
    if(!state.periodAction){
      const buttons=[];
      buttons.push(h('button',{className:'ms',style:{padding:'12px'},on:{click:()=>update({periodAction:'new'})}},'Start New Month'));
      buttons.push(h('button',{className:'mc',style:{padding:'12px'},on:{click:()=>update({periodAction:'edit'})}},'✏️ Edit Current Period'));
      buttons.push(h('button',{className:'mc',style:{padding:'12px'},on:{click:()=>update({periodAction:'end'})}},'End Current (no new)'));
      buttons.push(h('button',{className:'mc',style:{padding:'12px'},on:{click:()=>update({showPeriodModal:false,showExport:true})}},'📥 Backup & Export'));
      // Restore options
      if(state.hiddenPaydays&&state.hiddenPaydays.length>0){
        const ms=state.hiddenPaydays.map(p=>p.month).join(', ');
        buttons.push(h('button',{className:'mc',style:{padding:'12px',color:'#E0A030'},on:{click:()=>{restorePaydays();state.showPeriodModal=false;render()}}},`♻️ Restore ${state.hiddenPaydays.length} deleted plan entries (${ms})`));
      }
      if(state.hiddenHist&&state.hiddenHist.length>0){
        buttons.push(h('button',{className:'mc',style:{padding:'12px',color:'#E0A030'},on:{click:()=>{restoreHistMonths();state.showPeriodModal=false;render()}}},`♻️ Restore ${state.hiddenHist.length} deleted history months (${state.hiddenHist.join(', ')})`));
      }
      buttons.push(h('button',{className:'mc',style:{padding:'12px'},on:{click:clearCurrentEntries}},'🗑 Clear Current Entries'));
      buttons.push(h('button',{className:'mc',style:{padding:'12px',color:'#C0544E'},on:{click:()=>update({showConfirmReset:true})}},'⚠ Reset All Data'));
      buttons.push(h('button',{className:'mc',style:{padding:'12px',color:'#5C6080'},on:{click:()=>update({showPeriodModal:false,periodAction:null})}},'Cancel'));
      md.appendChild(h('div',{style:{display:'flex',flexDirection:'column',gap:'8px'}},...buttons));
    } else if(state.periodAction==='edit'){
      if(!state.editPeriodName)state.editPeriodName=curP.label;
      if(!state.editPeriodStart)state.editPeriodStart=curP.start;
      md.appendChild(h('p',{style:{fontSize:'12px',color:'#8090B0',margin:'0 0 10px'}},'Change the name or start date of the current period.'));
      md.appendChild(h('label',{style:{fontSize:'11px',color:'#5C6080'}},'Period name'));
      md.appendChild(h('input',{className:'mi',style:{marginBottom:'8px'},value:state.editPeriodName,on:{input:e=>{state.editPeriodName=e.target.value}}}));
      md.appendChild(h('label',{style:{fontSize:'11px',color:'#5C6080'}},'Start date'));
      md.appendChild(h('input',{type:'date',className:'mi',style:{marginBottom:'12px',colorScheme:'dark'},value:state.editPeriodStart,on:{input:e=>{state.editPeriodStart=e.target.value}}}));
      md.appendChild(h('div',{style:{display:'flex',gap:'8px'}},
        h('button',{className:'mc',on:{click:()=>{state.editPeriodName='';state.editPeriodStart='';update({periodAction:null})}}},'Back'),
        h('button',{className:'ms',on:{click:()=>{
          const name=state.editPeriodName||curP.label;
          const start=state.editPeriodStart||curP.start;
          state.periods=state.periods.map(p=>p.id===curP.id?{...p,id:name,label:name,start:start}:p);
          state.editPeriodName='';state.editPeriodStart='';state.showPeriodModal=false;state.periodAction=null;
          persist();render();
        }}},'Save')
      ));
    } else if(state.periodAction==='new'){
      md.appendChild(h('p',{style:{fontSize:'12px',color:'#8090B0',margin:'0 0 10px'}},'This will close the current period and start a new one.'));
      md.appendChild(h('input',{className:'mi',style:{marginBottom:'8px'},placeholder:'Month name (e.g. May26)',value:state.newPeriodName,on:{input:e=>{state.newPeriodName=e.target.value}}}));
      md.appendChild(h('label',{style:{fontSize:'11px',color:'#5C6080'}},'Start date'));
      md.appendChild(h('input',{type:'date',className:'mi',style:{marginBottom:'12px',colorScheme:'dark'},value:state.newPeriodStart||tk(),on:{input:e=>{state.newPeriodStart=e.target.value}}}));
      md.appendChild(h('div',{style:{display:'flex',gap:'8px'}},
        h('button',{className:'mc',on:{click:()=>update({periodAction:null})}},'Back'),
        h('button',{className:'ms',on:{click:startNewPeriod}},'Start Period')
      ));
    } else if(state.periodAction==='end'){
      md.appendChild(h('p',{style:{fontSize:'12px',color:'#8090B0',margin:'0 0 12px'}},`End "${curP.label}" as of today (${fd(tk())})?`));
      md.appendChild(h('div',{style:{display:'flex',gap:'8px'}},
        h('button',{className:'mc',on:{click:()=>update({periodAction:null})}},'Back'),
        h('button',{className:'ms',style:{background:'#C0544E'},on:{click:endCurrentPeriod}},'End Period')
      ));
    }
    ov.appendChild(md);app.appendChild(ov);
  }

  if(state.showExport){
    const ov=h('div',{className:'ov',on:{click:e=>{if(e.target===e.currentTarget)update({showExport:false})}}});
    const md=h('div',{className:'md',style:{maxHeight:'85vh',overflowY:'auto'}});
    md.appendChild(h('h3',{style:{margin:'0 0 14px',fontSize:'16px',color:'#E8E9F0'}},'Backup & Export'));
    
    const lastBackup=LS.get('sp-last-backup');
    if(lastBackup){
      md.appendChild(h('p',{style:{fontSize:'11px',color:'#4AE88A',margin:'0 0 12px'}},`Last backup: ${fd(lastBackup)}`));
    } else {
      md.appendChild(h('p',{style:{fontSize:'11px',color:'#E0A030',margin:'0 0 12px'}},'No backup yet — back up your data regularly!'));
    }

    md.appendChild(h('div',{style:{display:'flex',flexDirection:'column',gap:'8px'}},
      h('button',{className:'ms',style:{padding:'14px',textAlign:'left',background:'#1B6B3B'},on:{click:backupToGDrive},innerHTML:'<span style="font-size:15px">☁️ Backup to Cloud</span><br><span style="font-size:11px;font-weight:400;opacity:.7">Save to Google Drive, iCloud, WhatsApp, or any app via share sheet</span>'}),
      h('button',{className:'ms',style:{padding:'14px',textAlign:'left'},on:{click:exportCSV},innerHTML:'<span style="font-size:15px">📊 Export CSV</span><br><span style="font-size:11px;font-weight:400;opacity:.7">Monthly + daily data. Opens in Excel/Numbers.</span>'}),
      h('button',{className:'ms',style:{padding:'14px',textAlign:'left',background:'#2A4A6B'},on:{click:exportJSON},innerHTML:'<span style="font-size:15px">💾 Export JSON</span><br><span style="font-size:11px;font-weight:400;opacity:.7">Full data file. Upload to Claude to rebuild .xlsx</span>'})
    ));

    // Restore section
    md.appendChild(h('div',{style:{borderTop:'1px solid #22223E',marginTop:'14px',paddingTop:'14px'}}));
    md.appendChild(h('span',{className:'sl',style:{display:'block',marginBottom:'8px'}},'Restore from Backup'));
    const fileInput=h('input',{type:'file',accept:'.json',style:{display:'none'},on:{change:e=>{if(e.target.files[0])restoreFromBackup(e.target.files[0])}}});
    md.appendChild(fileInput);
    md.appendChild(h('button',{className:'mc',style:{width:'100%',padding:'12px',textAlign:'left'},on:{click:()=>fileInput.click()},innerHTML:'<span style="font-size:14px">📂 Restore from JSON backup</span><br><span style="font-size:11px;color:#5C6080">Select a previously saved backup file</span>'}));

    md.appendChild(h('button',{className:'mc',style:{padding:'12px',marginTop:'8px',width:'100%',color:'#5C6080'},on:{click:()=>update({showExport:false})}},'Cancel'));
    ov.appendChild(md);app.appendChild(ov);
  }

  if(state.showConfirmReset){
    const ov=h('div',{className:'ov',on:{click:e=>{if(e.target===e.currentTarget)update({showConfirmReset:false})}}});
    const md=h('div',{className:'md'});
    md.appendChild(h('h3',{style:{margin:'0 0 10px',fontSize:'16px',color:'#E8564A'}},'⚠ Reset All Data'));
    md.appendChild(h('p',{style:{fontSize:'13px',color:'#8090B0',margin:'0 0 8px',lineHeight:'1.6'}},'This will permanently delete all your logged entries and periods. Historical data (Dec 2024 – Mar 2026) in the History tab will remain since it\'s built into the app.'));
    md.appendChild(h('p',{style:{fontSize:'13px',color:'#C0544E',fontWeight:600,margin:'0 0 16px'}},'This cannot be undone.'));
    md.appendChild(h('div',{style:{display:'flex',gap:'8px'}},
      h('button',{className:'mc',on:{click:()=>update({showConfirmReset:false})}},'Cancel'),
      h('button',{className:'ms',style:{background:'#C0544E'},on:{click:resetAllData}},'Delete Everything')
    ));
    ov.appendChild(md);app.appendChild(ov);
  }
}

render();
// Weekly backup reminder
(function checkBackup(){
  const last=LS.get('sp-last-backup');
  const dismissed=LS.get('sp-backup-dismissed');
  const now=new Date();
  const daysSinceBackup=last?Math.floor((now-new Date(last))/864e5):999;
  const daysSinceDismiss=dismissed?Math.floor((now-new Date(dismissed))/864e5):999;
  if(daysSinceBackup>=7&&daysSinceDismiss>=1){state.showBackupReminder=true;render()}
})();
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js')}
</script>
</body>
</html>
